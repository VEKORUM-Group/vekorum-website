name: Website quality
on:
  push:
  pull_request:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/audit.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --check script.js
